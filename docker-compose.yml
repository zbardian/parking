version: "3.9"

services:
  parking_detector:
    build: .
    container_name: parking_detector
    network_mode: "host"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - RTSP_URL=rtsp://127.0.0.1:8554/stream1
      - RTSP_FALLBACK_URL=rtsp://192.168.50.50:8554/stream1
      - RTSP_USER=${RTSP_USER}
      - RTSP_PASSWORD=${RTSP_PASSWORD}
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
